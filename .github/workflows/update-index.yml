name: Update PFPJ Index

on:
  workflow_dispatch:
  schedule:
    - cron: "0 18 1,15 * *"

jobs:
  update-index:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install packages
        run: npm ci

        - name: Build and upload KV index
        env:
          PCLOUD_ACCESS_TOKEN: ${{ secrets.PCLOUD_ACCESS_TOKEN }}
          PCLOUD_HOSTNAME: ${{ secrets.PCLOUD_HOSTNAME }}
          PCLOUD_LOCATION_ID: ${{ secrets.PCLOUD_LOCATION_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          PFPJ_KV_NAMESPACE_ID: ${{ secrets.PFPJ_KV_NAMESPACE_ID }}
        run: npm run refresh-kv