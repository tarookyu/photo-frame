name: Update Photo Index

on:
  workflow_dispatch:

jobs:
  update-index:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install packages
        run: npm ci

      - name: Run indexer
        env:
          PCLOUD_ACCESS_TOKEN: ${{ secrets.PCLOUD_ACCESS_TOKEN }}
          PCLOUD_HOSTNAME: ${{ secrets.PCLOUD_HOSTNAME }}
          PCLOUD_LOCATION_ID: ${{ secrets.PCLOUD_LOCATION_ID }}
        run: npm run build-index

      - name: Commit index
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@users.noreply.github.com"

          git add data/

          if git diff --cached --quiet; then
            echo "No changes"
          else
            git commit -m "Update photo index"
            git push
          fi